services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_DB: oneelo_saas
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d oneelo_saas"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: api
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - ./apps/api/.env
    environment:
      - DATABASE_URL=postgresql://dev:dev@postgres:5432/oneelo_saas
      - RUN_SEED=true
    volumes:
      - ./apps/api/src:/app/src
      - ./apps/api/prisma:/app/prisma
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - network

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:3000
        - INTERNAL_API_URL=http://api:3000
    container_name: web
    restart: always
    ports:
      - "3001:3000"
    env_file:
      - ./apps/web/.env
    environment:
      - INTERNAL_API_URL=http://api:3000
    volumes:
      - ./apps/web/src:/app/src
      - ./apps/web/public:/app/public
    depends_on:
      - api
    networks:
      - network

volumes:
  pgdata:

networks:
  network:
    driver: bridge

