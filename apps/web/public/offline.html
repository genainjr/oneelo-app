<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>One Elo offline</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: #f8fafc;
        color: #111827;
      }

      main {
        width: min(420px, calc(100vw - 32px));
        padding: 32px;
        border: 1px solid #e5e7eb;
        border-radius: 24px;
        background: #ffffff;
        box-shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
        text-align: center;
      }

      img {
        width: 64px;
        height: 64px;
        border-radius: 18px;
      }

      h1 {
        margin: 20px 0 8px;
        font-size: 22px;
      }

      p {
        margin: 0;
        color: #6b7280;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/icon-192.png" alt="One Elo" />
      <h1>Sem conexão</h1>
      <p>Verifique sua internet e tente acessar o One Elo novamente.</p>
    </main>
  </body>
</html>
